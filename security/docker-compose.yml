version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tecsup_db
    environment:
      POSTGRES_DB: tecsup_security
      POSTGRES_USER: tecsup
      POSTGRES_PASSWORD: tecsup123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tecsup -d tecsup_security"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

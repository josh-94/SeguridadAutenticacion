spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/tecsup_security
    username: tecsup
    password: tecsup123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false

app:
  jwt:
    secret: "dGVjc3VwLXNlY3VyaXR5LXRhcmVhLXNlY3JldC1rZXktbXVzdC1iZS0yNTYtYml0cw=="
    expiration-ms: 86400000   # 24 horas

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.tecsup: DEBUG
    org.springframework.security: DEBUG

server:
  error:
   include-message: never
   include-stacktrace: never
  include-exception: false

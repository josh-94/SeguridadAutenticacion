name: CodeQL Security Analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 6 * * 1'  # Cada lunes a las 6 AM

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [ 'java-kotlin', 'javascript-typescript' ]
        #   ☝️ Cubre tu backend Java y tu frontend React/TS

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java (solo para backend)
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended   # Más reglas de seguridad
          config: |
            paths-ignore:
              - '**/node_modules/**'
              - '**/target/**'
              - '**/*.test.js'
              - '**/*.spec.ts'

      - name: Build backend (Maven)
        if: matrix.language == 'java-kotlin'
        run: |
          cd security
          mvn clean package -DskipTests

      - name: Autobuild frontend
        if: matrix.language == 'javascript-typescript'
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
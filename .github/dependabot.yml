version: 2

updates:
  # 🔵 Dependencias del backend Java (Maven)
  - package-ecosystem: "maven"
    directory: "/security"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "security"
      - "dependencies"

  # 🟡 Dependencias del frontend React (npm)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "security"
      - "dependencies"

  # 🐳 Si usas Docker (tienes docker-compose en /security)
  - package-ecosystem: "docker"
    directory: "/security"
    schedule:
      interval: "weekly"